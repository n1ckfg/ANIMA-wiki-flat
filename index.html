  .slider-val { font-size: 12px; color: #FF5722; min-width: 28px; text-align: right; font-weight: bold; }
  .cb-row { display: flex; align-items: center; gap: 6px; font-size: 12px; margin: 3px 0; cursor: pointer; }
  .cb-row input { accent-color: #FF5722; }

    position: fixed; top: 0; right: 0; width: clamp(480px, 33vw, 720px); max-width: 100vw; height: 100vh;

    "markdown": "---\ntitle: \"Overview\"\ntype: synthesis\ntags: []\nsources: []\nlast_updated: \"2024-05-24\"\n---\n\n# Overview\n\n*This page is maintained by the LLM. It is updated on every ingest to reflect the current synthesis across all sources.*\n\nThe wiki currently documents the [[ANIMA]] project (Arts Network for Integrated Media Applications), a multimedia cultural information service developed by the [[WebWeavers]] around 1994. The [[WebWeavers]] group includes key figures such as [[DerekDowden]], [[OliverHockenhull]], and [[HankBull]]. It focuses on [[VirtualCommunities]], telecommunications, and the intersection of art and technology. Various spaces such as Persona (for voice/vision community discourse), Techne (focused on interface and immersion research), and Spectrum (an index for online publications like [[Ctheory]]) expand upon these core themes.\n\nKey figures associated with this network or its related projects include artists like [[HankBull]] (associated with [[WesternFront]], which also featured cover art by [[ChickRice]]), [[JudyMalloy]], [[OliverHockenhull]], and contributors such as [[DerekDowden]] and [[WestonTriemstra]]. Additionally, authors such as [[HowardRheingold]] and [[MarkTribe]] explore the implications of these [[VirtualCommunities]] and concepts such as [[Postmodernism]] and technological [[Schizophrenia]]. \n\nMajor sections of [[ANIMA]] include [[ArtWorld]] (a directory of online arts and gallery links, sponsored by the [[VancouverCyberspaceAssociation]]), [[ATLAS]] (a resource and reference library bridging artists and technologists), and [[Communitas]]. The network hosts various initiatives like the CyberCube Project, European research exchanges (EUROPROBE), Techne (immersion and interactivity research), and event announcements like the Infomy.internet.* and Infomy. undernet.* 1994 New Years Eve Celebrations spearheaded by [[BenjaminWatson]]. It also prominently features [[NEXUS]], a platform for exploratory [[TelematicArt]] projects, such as \"Making Art Online\" (edited by [[JudyMalloy]]) and \"Imag(in)ing Networks\". Another notable proposal is the [[Mediabase]] concept by [[JeffBerryman]] and [[OliverHockenhull]], which discusses organizing media art works using database structures to support collaborative and associative [[Hypermedia]] environments. In this vein, the concept of Synarchy—a synchronous synthetic anarchy—is introduced as a model for organic groupware.\n\nThe project also features a significant collection of essays by [[OliverHockenhull]] (\"Towards A Furious Philosophy Of The Discrete\"). These essays dive into philosophical topics, referencing figures like [[PaulVirilio]], [[WalterBenjamin]], [[TsaoHsuehChin]], [[NorbertWiener]], and Kasimir Malevich, as well as engaging with historical anomalies involving figures like [[JohnLightfoot]] and [[JamesUrsher]]. They explore concepts like [[Neoplatonism]], [[InformationTheory]] (referencing [[GregoryBateson]] and [[AnthonyWilden]]), [[ArtificialIntelligence]], the impact of [[Evolution]] and [[Language]] on brain deduplication (citing [[CharlesNeedham]]), the psychology of displacement, and the nature of innovation. The intersection of technology, ecology, and the culture of war is also explored, highlighted by inclusions such as [[RichardBrautigan]]'s poem on [[Cybernetics]], \"All Watched Over by Machines of Loving Grace\". Furthermore, a novel \"IdeaRights\" framework is presented as an alternative to traditional copyright.\n\n\nThe wiki contains a series of poetic and structural texts from the 'Digearth' collection, extensively exploring themes of [[Time]], [[Space]], [[Consumption]], and the nature of the [[Web]] and [[Communication]].\n\nThe wiki contains additional poetic and structural texts from the 'Digearth' collection, exploring metaphysical concepts such as [[Time]], [[Space]], [[Reality]], and the relationship between [[Mass]] and [[Energy]].\n\nThe wiki contains additional philosophical, poetic, and media-theory fragments from the 'Digearth' collection, touching upon concepts like [[Time]], [[Energy]], [[Memory]], and [[Digital Earth]].\n\nThe wiki expanded with poetic fragments regarding connection, the cost of a soul, nomadic architecture, maternal heritage, and the sensory reflections of the Digearth collection.",

const nodes = new vis.DataSet(originalNodes);
const edges = new vis.DataSet(originalEdges);
const adjacency = new Map();
const searchInput = document.getElementById("search");
const stats = document.getElementById("stats");
const controls = {
  extracted: document.getElementById("cb-extracted"),
  inferred: document.getElementById("cb-inferred"),
  ambiguous: document.getElementById("cb-ambiguous"),
  confSlider: document.getElementById("conf-slider"),
  confValue: document.getElementById("conf-val"),
};
const nodeMap = new Map(originalNodes.map(node => [node.id, node]));
let activeNodeId = null;

function hexToRgba(color, alpha) {
  if (!color) return `rgba(255, 255, 255, ${alpha})`;
  const normalized = color.replace("#", "");
  const value = normalized.length === 3
    ? normalized.split("").map(ch => ch + ch).join("")
    : normalized;
  const intValue = Number.parseInt(value, 16);
  const r = (intValue >> 16) & 255;
  const g = (intValue >> 8) & 255;
  const b = intValue & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function escapeHtml(text) {
  return (text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function stripFrontmatter(markdown) {
  return (markdown || "").replace(/^---\n[\s\S]*?\n---\n?/, "");
}

function renderInlineMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/\[\[([^\]]+)\]\]/g, '<span class="wikilink">[[$1]]</span>');
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  return html;
}

function renderMarkdown(markdown) {
  const lines = stripFrontmatter(markdown).split(/\r?\n/);
  const html = [];
  let paragraph = [];
  let listType = null;
  let listItems = [];
  let quoteLines = [];
  let inCodeBlock = false;
  let codeLines = [];

  function flushParagraph() {
    if (!paragraph.length) return;
    html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
    paragraph = [];
  }

  function flushList() {
    if (!listType || !listItems.length) return;
    const items = listItems.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("");
    html.push(`<${listType}>${items}</${listType}>`);
    listType = null;
    listItems = [];
  }

  function flushQuote() {
    if (!quoteLines.length) return;
    html.push(`<blockquote>${quoteLines.map(line => renderInlineMarkdown(line)).join("<br>")}</blockquote>`);
    quoteLines = [];
  }

  function flushCode() {
    if (!codeLines.length) {
      html.push("<pre><code></code></pre>");
      return;
    }
    html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
    codeLines = [];
  }

  for (const rawLine of lines) {
    const line = rawLine.replace(/\t/g, "    ");
    const trimmed = line.trim();

    if (trimmed.startsWith("```")) {
      flushParagraph();
      flushList();
      flushQuote();
      if (inCodeBlock) {
        flushCode();
        inCodeBlock = false;
      } else {
        inCodeBlock = true;
      }
      continue;
    }

    if (inCodeBlock) {
      codeLines.push(rawLine);
      continue;
    }

    if (!trimmed) {
      flushParagraph();
      flushList();
      flushQuote();
      continue;
    }

    const headingMatch = trimmed.match(/^(#(1, 6))\s+(.+)$/);
    if (headingMatch) {
      flushParagraph();
      flushList();
      flushQuote();
      const level = headingMatch[1].length;
      html.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
      continue;
    }

    if (/^(-(3,)|\*(3,))$/.test(trimmed)) {
      flushParagraph();
      flushList();
      flushQuote();
      html.push("<hr>");
      continue;
    }

    const quoteMatch = trimmed.match(/^>\s?(.*)$/);
    if (quoteMatch) {
      flushParagraph();
      flushList();
      quoteLines.push(quoteMatch[1]);
      continue;
    }
    flushQuote();

    const unorderedMatch = trimmed.match(/^[-*]\s+(.+)$/);
    if (unorderedMatch) {
      flushParagraph();
      if (listType && listType !== "ul") flushList();
      listType = "ul";
      listItems.push(unorderedMatch[1]);
      continue;
    }

    const orderedMatch = trimmed.match(/^\d+\.\s+(.+)$/);
    if (orderedMatch) {
      flushParagraph();
      if (listType && listType !== "ol") flushList();
      listType = "ol";
      listItems.push(orderedMatch[1]);
      continue;
    }

    flushList();
    paragraph.push(trimmed);
  }

  if (inCodeBlock) flushCode();
  flushParagraph();
  flushList();
  flushQuote();
  return html.join("");
}

function rebuildAdjacency(filteredEdges) {
  adjacency.clear();
  for (const node of originalNodes) {
    adjacency.set(node.id, new Set());
  }
  for (const edge of filteredEdges) {
    if (!adjacency.has(edge.from)) adjacency.set(edge.from, new Set());
    if (!adjacency.has(edge.to)) adjacency.set(edge.to, new Set());
    adjacency.get(edge.from).add(edge.to);
    adjacency.get(edge.to).add(edge.from);
  }
}

function currentEdgeState() {
  const minConf = parseInt(controls.confSlider.value, 10) / 100;
  controls.confValue.textContent = minConf.toFixed(2);
  return {
    showExtracted: controls.extracted.checked,
    showInferred: controls.inferred.checked,
    showAmbiguous: controls.ambiguous.checked,
    minConf,
  };
}

function passesEdgeFilters(edge, edgeState) {
  const typeOk = (edge.type === "EXTRACTED" && edgeState.showExtracted)
    || (edge.type === "INFERRED" && edgeState.showInferred)
    || (edge.type === "AMBIGUOUS" && edgeState.showAmbiguous);
  const confOk = (edge.confidence ?? 1.0) >= edgeState.minConf;
  return typeOk && confOk;
}

function searchNodes(q) {
  applyFilters(q, activeNodeId);
}

function clearSelection() {
  activeNodeId = null;
  closeDrawer();
  applyFilters(searchInput.value, null);
}

function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
}

function openDrawer(node, relatedIds) {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-title").textContent = node.label;
  const communityText = Number.isInteger(node.group) && node.group >= 0 ? ` · community ${node.group}` : "";
  document.getElementById("drawer-meta").textContent = `${node.type}${communityText}`;
  document.getElementById("drawer-path").textContent = node.path;
  document.getElementById("drawer-preview").textContent = node.preview || "";
  document.getElementById("drawer-markdown").innerHTML = renderMarkdown(node.markdown || "");

  const relatedList = document.getElementById("drawer-related-list");
  relatedList.innerHTML = "";
  const relatedNodes = originalNodes
    .filter(item => relatedIds.has(item.id) && item.id !== node.id)
    .sort((a, b) => a.label.localeCompare(b.label));

  if (relatedNodes.length === 0) {
    const empty = document.createElement("span");
    empty.textContent = "No directly connected nodes";
    relatedList.appendChild(empty);
    return;
  }

  for (const related of relatedNodes) {
    const chip = document.createElement("button");
    chip.className = "related-chip";
    chip.textContent = related.label;
    chip.onclick = () => focusNode(related.id);
    relatedList.appendChild(chip);
  }
}

function applyFilters(query = searchInput.value, selectedNodeId = activeNodeId) {
  const lower = (query || "").trim().toLowerCase();
  const edgeState = currentEdgeState();
  const filteredEdges = originalEdges.filter(edge => passesEdgeFilters(edge, edgeState));
  rebuildAdjacency(filteredEdges);

  const relatedIds = selectedNodeId
    ? new Set([selectedNodeId, ...(adjacency.get(selectedNodeId) || [])])
    : null;
  const filteredNodeIds = new Set();
  for (const edge of filteredEdges) {
    filteredNodeIds.add(edge.from);
    filteredNodeIds.add(edge.to);
  }

  let visibleNodeCount = 0;
  const nodeUpdates = originalNodes.map(node => {
    const matchesSearch = !lower || node.label.toLowerCase().includes(lower);
    const isActive = selectedNodeId === node.id;
    const isConnected = filteredNodeIds.has(node.id);
    const isRelated = !relatedIds || relatedIds.has(node.id);
    const hidden = !selectedNodeId && !lower && !isConnected;
    const emphasized = matchesSearch && isRelated && (isConnected || !!lower || isActive);

    if (!hidden) {
      visibleNodeCount += 1;
    }

    return {
      id: node.id,
      hidden,
      color: {
        background: emphasized ? node.color : hexToRgba(node.color, hidden ? 0.05 : 0.14),
        border: emphasized ? hexToRgba(node.color, 0.96) : hexToRgba(node.color, hidden ? 0.08 : 0.22),
        highlight: { background: node.color, border: hexToRgba(node.color, 1) },
        hover: { background: node.color, border: hexToRgba(node.color, 1) },
      },
      font: {
        color: emphasized ? "#f2f3f8" : hidden ? "rgba(242,243,248,0.08)" : "rgba(242,243,248,0.2)",
      },
      borderWidth: isActive ? 5 : 2,
      size: isActive ? 18 : 12,
    };
  });

  const edgeUpdates = originalEdges.map(edge => {
    const enabled = passesEdgeFilters(edge, edgeState);
    if (!enabled) {
      return { id: edge.id, hidden: true };
    }

    const matchesSearch = !lower
      || nodeMap.get(edge.from)?.label.toLowerCase().includes(lower)
      || nodeMap.get(edge.to)?.label.toLowerCase().includes(lower);
    const isRelated = !relatedIds || relatedIds.has(edge.from) || relatedIds.has(edge.to);
    const touchesActive = !!selectedNodeId && (edge.from === selectedNodeId || edge.to === selectedNodeId);
    const emphasized = matchesSearch && isRelated;

    return {
      id: edge.id,
      hidden: false,
      width: touchesActive ? 2.8 : emphasized ? 1.2 : 0.6,
      color: emphasized ? edge.color : hexToRgba(edge.color, 0.08),
    };
  });

  nodes.update(nodeUpdates);
  edges.update(edgeUpdates);

  if (selectedNodeId) {
    const activeNode = nodeMap.get(selectedNodeId);
    if (activeNode) {
      openDrawer(activeNode, relatedIds || new Set([selectedNodeId]));
    }
  }

  const focusSuffix = selectedNodeId && nodeMap.get(selectedNodeId)
    ? ` · focused: ${nodeMap.get(selectedNodeId).label}`
    : "";
  stats.textContent = `${visibleNodeCount} nodes · ${filteredEdges.length} edges${focusSuffix}`;
}

const container = document.getElementById("graph");

// Adaptive physics based on graph size
const nodeCount = originalNodes.length;
const gravConst = nodeCount > 80 ? -8000 : nodeCount > 30 ? -5000 : -2000;
const springLen = nodeCount > 80 ? 250 : nodeCount > 30 ? 200 : 150;

const network = new vis.Network(container, { nodes, edges }, {
  nodes: {
    shape: "dot",
    font: { color: "#ddd", size: 12, strokeWidth: 3, strokeColor: "#111" },
    borderWidth: 1.5,
    scaling: {
      min: 8,
      max: 40,
      label: { enabled: true, min: 10, max: 20, drawThreshold: 6, maxVisible: 24 },
    },
  },
  edges: {
    width: 0.8,
    smooth: { type: "continuous" },
    arrows: { to: { enabled: true, scaleFactor: 0.4 } },
    color: { inherit: false },
    hoverWidth: 2,
  },
  physics: {
    stabilization: { iterations: 250, updateInterval: 25, fit: true },
    barnesHut: { gravitationalConstant: gravConst, springLength: springLen, springConstant: 0.02, damping: 0.15 },
    minVelocity: 0.75,
  },
  interaction: { hover: true, tooltipDelay: 150, hideEdgesOnDrag: true, hideEdgesOnZoom: true },
});

// Ensure the graph fits the viewport after physics stabilization
network.once("stabilizationIterationsDone", function () {
  network.fit({ animation: { duration: 400, easingFunction: "easeInOutQuad" } });
});

function focusNode(nodeId) {
  activeNodeId = nodeId;
  applyFilters(searchInput.value, nodeId);
  const node = nodeMap.get(nodeId) || nodes.get(nodeId);
  const relatedIds = new Set([nodeId, ...(adjacency.get(nodeId) || [])]);
  openDrawer(node, relatedIds);
  network.focus(nodeId, {
    scale: 1.1,
    animation: { duration: 300, easingFunction: "easeInOutQuad" },
  });
}

network.on("click", params => {
  if (params.nodes.length > 0) {
    focusNode(params.nodes[0]);
  } else {
    clearSelection();
  }
});

applyFilters();
</script>
